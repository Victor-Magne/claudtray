<!DOCTYPE html>
<html lang="pt" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'nonce-__CLAUDTRAY_NONCE__'; script-src 'nonce-__CLAUDTRAY_NONCE__'; img-src data:; connect-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>ClaudTray</title>
    <style nonce="__CLAUDTRAY_NONCE__">
__CLAUDTRAY_CSS__
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo">AI</div>
        <div class="titles">
          <span class="name">ClaudTray</span>
          <span class="sub">AI Usage Monitor</span>
        </div>
        <div class="spacer"></div>
        <div class="global-pill">
          <span class="dot" id="global-dot"></span>
          <span id="global-status">—</span>
        </div>
      </header>

      <div class="updated" id="updated">A carregar…</div>

      <div class="tabs" id="tabs"></div>

      <div class="cards" id="cards"></div>

      <footer>
        <button class="btn" id="btn-refresh">↻ Atualizar</button>
        <div class="spacer"></div>
        <button class="btn icon" id="btn-theme" title="Alternar tema">◐</button>
        <button class="btn icon" id="btn-settings" title="Definições">⚙</button>
        <button class="btn icon" id="btn-close" title="Fechar">✕</button>
      </footer>
    </div>

    <!-- Settings overlay -->
    <div class="overlay" id="settings">
      <h2>Definições</h2>

      <div class="field">
        <label>Tema</label>
        <div class="seg" id="theme-seg">
          <div class="tab" data-theme-value="dark">Escuro</div>
          <div class="tab" data-theme-value="light">Claro</div>
          <div class="tab" data-theme-value="system">Sistema</div>
        </div>
      </div>

      <div class="field">
        <label>
          Token GitHub (Copilot) — opcional
          <button class="link-btn" data-url="github-tokens">Obter ↗</button>
        </label>
        <div class="token-row">
          <input id="copilot-token" type="password" placeholder="ghp_…" />
          <button class="btn icon" id="btn-paste-token" title="Colar da área de transferência">⎘</button>
        </div>
      </div>

      <div class="field">
        <label>
          API Key OpenRouter — opcional
          <button class="link-btn" data-url="openrouter-keys">Obter ↗</button>
        </label>
        <div class="token-row">
          <input id="openrouter-key" type="password" placeholder="sk-or-…" />
          <button class="btn icon paste-btn" data-target="openrouter-key" title="Colar">⎘</button>
        </div>
      </div>

      <div class="field">
        <label>
          API Key Gemini (Google AI Studio) — opcional
          <button class="link-btn" data-url="gemini-keys">Obter ↗</button>
        </label>
        <div class="token-row">
          <input id="gemini-key" type="password" placeholder="AIza…" />
          <button class="btn icon paste-btn" data-target="gemini-key" title="Colar">⎘</button>
        </div>
      </div>

      <div class="field">
        <label>Proxy HTTP — opcional (ex: http://proxy:8080)</label>
        <input id="http-proxy" type="text" placeholder="http://…" />
      </div>

      <footer>
        <button class="btn" id="btn-save">Guardar</button>
        <div class="spacer"></div>
        <button class="btn" id="btn-settings-close">Fechar</button>
      </footer>
    </div>

    <script nonce="__CLAUDTRAY_NONCE__">
__CLAUDTRAY_JS__
    </script>
  </body>
</html>
