name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Patch installer version
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          (Get-Content installer.iss) `
            -replace '#define MyAppVersion\s+"[^"]+"', "#define MyAppVersion `"$v`"" |
            Set-Content installer.iss

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # Versioned, suffixed asset names so each release is unique and the
          # winget (Setup) / scoop (portable) manifests can target the right file.
          $v = "${{ steps.ver.outputs.version }}"
          Rename-Item installer_output\ClaudTray.exe "ClaudTray-$v-Setup.exe"
          # Standalone portable binary (CRT static, no installer) for scoop.
          Copy-Item target\x86_64-pc-windows-msvc\release\claudtray.exe `
            "installer_output\ClaudTray-$v-portable.exe"

      # ── Code signing (SignPath) ────────────────────────────────────────────
      # Only runs when the repo variable SIGNPATH_ENABLED == 'true'. Configure
      # once SignPath approves the project:
      #   Secret:    SIGNPATH_API_TOKEN
      #   Variables: SIGNPATH_ENABLED=true, SIGNPATH_ORGANIZATION_ID,
      #              SIGNPATH_PROJECT_SLUG, SIGNPATH_SIGNING_POLICY_SLUG
      # The signed installer is written back over the unsigned one so the rest
      # of the workflow (SHA256 + release) operates on the signed file.
      - name: Upload unsigned installer (for signing)
        id: unsigned
        if: vars.SIGNPATH_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: installer_output/*.exe

      - name: Sign installer with SignPath
        if: vars.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: installer_output
      # ───────────────────────────────────────────────────────────────────────

      - name: Compute SHA256
        id: sha256
        shell: pwsh
        run: |
          $setup = Get-ChildItem installer_output\*-Setup.exe | Select-Object -First 1
          $portable = Get-ChildItem installer_output\*-portable.exe | Select-Object -First 1
          $setupHash = (Get-FileHash $setup.FullName -Algorithm SHA256).Hash.ToUpper()
          $portableHash = (Get-FileHash $portable.FullName -Algorithm SHA256).Hash.ToLower()
          echo "hash=$setupHash" >> $env:GITHUB_OUTPUT
          echo "filename=$($setup.Name)" >> $env:GITHUB_OUTPUT
          echo "portable_hash=$portableHash" >> $env:GITHUB_OUTPUT
          echo "portable_filename=$($portable.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/*.exe
          generate_release_notes: true
          body: |
            ## Installation

            **winget**
            ```powershell
            winget install VictorMagne.ClaudTray
            ```

            **Scoop**
            ```powershell
            scoop bucket add victor-magne https://github.com/Victor-Magne/scoop-bucket
            scoop install claudtray
            ```

            **Direct download** — grab `${{ steps.sha256.outputs.filename }}`
            (installer) or `${{ steps.sha256.outputs.portable_filename }}`
            (portable, no install) below.

            ---

            ### SHA256
            ```
            Setup     ${{ steps.sha256.outputs.hash }}
            Portable  ${{ steps.sha256.outputs.portable_hash }}
            ```
            Use the Setup hash for the winget manifest and the Portable hash for
            the Scoop manifest.
