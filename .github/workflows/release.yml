name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Patch installer version
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          (Get-Content installer.iss) `
            -replace '#define MyAppVersion\s+"[^"]+"', "#define MyAppVersion `"$v`"" |
            Set-Content installer.iss

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # Rename to include version so each release has a unique asset name
          $v = "${{ steps.ver.outputs.version }}"
          Rename-Item installer_output\CloudTray.exe "CloudTray-$v.exe"

      - name: Compute SHA256
        id: sha256
        shell: pwsh
        run: |
          $file = Get-ChildItem installer_output\*.exe | Select-Object -First 1
          $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToUpper()
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
          echo "filename=$($file.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/*.exe
          generate_release_notes: true
          body: |
            ## Installation

            **winget**
            ```powershell
            winget install VictorMagne.CloudTray
            ```

            **Scoop**
            ```powershell
            scoop bucket add victor-magne https://github.com/Victor-Magne/scoop-bucket
            scoop install cloudtray
            ```

            **Direct installer** — download `${{ steps.sha256.outputs.filename }}` below.

            ---

            ### SHA256 (installer)
            ```
            ${{ steps.sha256.outputs.hash }}
            ```
            Use this hash when submitting the winget or Scoop manifests.
