# winget installer manifest
# Replace <VERSION> and <SHA256> before submitting.
# SHA256 is printed in the GitHub release notes.

PackageIdentifier: VictorMagne.CloudTray
PackageVersion: <VERSION>
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.17763.0
InstallerType: inno
Scope: machine
InstallModes:
  - interactive
  - silent
UpgradeBehavior: install
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/Victor-Magne/cloudtray/releases/download/v<VERSION>/CloudTray-<VERSION>.exe
    InstallerSha256: <SHA256>
    ProductCode: '{F3A7B2C1-8D4E-4F9A-B6C2-1E5D7A3F8B9C}_is1'
    InstallerSwitches:
      Silent: /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-
      SilentWithProgress: /SILENT /SUPPRESSMSGBOXES /NORESTART /SP-
ManifestType: installer
ManifestVersion: 1.6.0
