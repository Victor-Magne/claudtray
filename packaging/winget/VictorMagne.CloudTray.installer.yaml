# winget installer manifest
# Replace <VERSION> and <SHA256> before submitting.
# SHA256 is printed in the GitHub release notes.

PackageIdentifier: VictorMagne.CloudTray
PackageVersion: <VERSION>
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.0.0
InstallerType: inno
Scope: user
InstallModes:
  - interactive
  - silent
UpgradeBehavior: install
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/Victor-Magne/cloudtray/releases/download/v<VERSION>/CloudTray_Setup_<VERSION>.exe
    InstallerSha256: <SHA256>
    InstallerSwitches:
      Silent: /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
      SilentWithProgress: /SILENT /SUPPRESSMSGBOXES /NORESTART
ManifestType: installer
ManifestVersion: 1.6.0
